<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 850" width="960" height="850">
<style>
  text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  .title { font-size: 16px; fill: #111827; font-weight: 600; }
  .node-text { font-size: 13px; fill: #111827; font-weight: 600; }
  .sub-text { font-size: 11px; fill: #6b7280; }
  .small-text { font-size: 11px; fill: #6b7280; }
  .decision-text { font-size: 12px; fill: #111827; font-weight: 600; }
</style>
<text x="480" y="25" text-anchor="middle" class="title">EleBot 消息处理流程图</text>
<defs>
  <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
  </marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
  </marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
  </marker>
  <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
  </marker>
  <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
  </filter>
</defs>
<rect x="400" y="50" width="160" height="42" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
<text x="480" y="76" text-anchor="middle" class="node-text">用户输入消息</text>
<text x="480" y="91" text-anchor="middle" class="sub-text">终端 / CLI</text>
<line x1="480" y1="92" x2="480" y2="130" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)" />
<rect x="380" y="130" width="200" height="50" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
<text x="480" y="160" text-anchor="middle" class="node-text">CLI 读取</text>
<text x="480" y="175" text-anchor="middle" class="sub-text">stdin → Runtime 接收</text>
<text x="480" y="165" text-anchor="middle" class="small-text" fill="#6b7280">1</text>
<line x1="480" y1="180" x2="480" y2="210" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)" />
<polygon points="480,175 550,245 480,315 410,245" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
<text x="480" y="249" text-anchor="middle" class="decision-text">斜杠命令？</text>
<text x="480" y="228" text-anchor="middle" class="small-text" fill="#6b7280">2</text>
<line x1="480" y1="245" x2="620" y2="245" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)" />
<text x="550" y="240" class="small-text" fill="#16a34a">是</text>
<rect x="620" y="220" width="180" height="50" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
<text x="710" y="250" text-anchor="middle" class="node-text">CommandRouter</text>
<text x="710" y="265" text-anchor="middle" class="sub-text">匹配命令处理器</text>
<text x="710" y="255" text-anchor="middle" class="small-text" fill="#6b7280">3</text>
<line x1="710" y1="270" x2="710" y2="330" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)" />
<rect x="620" y="330" width="180" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
<text x="710" y="360" text-anchor="middle" class="node-text">执行斜杠命令</text>
<text x="710" y="375" text-anchor="middle" class="sub-text">/task /dream /status /new</text>
<text x="710" y="365" text-anchor="middle" class="small-text" fill="#6b7280">4</text>
<line x1="710" y1="380" x2="710" y2="430" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)" />
<rect x="620" y="430" width="180" height="42" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
<text x="710" y="456" text-anchor="middle" class="node-text">命令结果输出</text>
<text x="710" y="471" text-anchor="middle" class="sub-text">直接返回终端</text>
<text x="710" y="460" text-anchor="middle" class="small-text" fill="#6b7280">5</text>
<line x1="480" y1="245" x2="480" y2="290" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)" />
<text x="490" y="275" class="small-text" fill="#2563eb">否</text>
<rect x="370" y="290" width="220" height="50" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
<text x="480" y="320" text-anchor="middle" class="node-text">AgentLoop.build_context()</text>
<text x="480" y="335" text-anchor="middle" class="sub-text">读取记忆 + 历史记录</text>
<text x="480" y="325" text-anchor="middle" class="small-text" fill="#6b7280">3</text>
<line x1="480" y1="340" x2="480" y2="380" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)" />
<rect x="380" y="380" width="200" height="50" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
<text x="480" y="410" text-anchor="middle" class="node-text">AgentRunner → Provider</text>
<text x="480" y="425" text-anchor="middle" class="sub-text">调用 DeepSeek V4 Flash</text>
<text x="480" y="415" text-anchor="middle" class="small-text" fill="#6b7280">4</text>
<line x1="480" y1="430" x2="480" y2="470" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)" />
<polygon points="480,440 550,510 480,580 410,510" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
<text x="480" y="514" text-anchor="middle" class="decision-text">tool_calls？</text>
<text x="480" y="493" text-anchor="middle" class="small-text" fill="#6b7280">5</text>
<line x1="480" y1="510" x2="620" y2="510" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)" />
<text x="550" y="505" class="small-text" fill="#dc2626">是</text>
<rect x="620" y="485" width="180" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
<text x="710" y="515" text-anchor="middle" class="node-text">执行工具调用</text>
<text x="710" y="530" text-anchor="middle" class="sub-text">File / Search / Web / MCP / Skill</text>
<text x="710" y="520" text-anchor="middle" class="small-text" fill="#6b7280">6</text>
<line x1="710" y1="535" x2="710" y2="570" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)" />
<rect x="620" y="570" width="180" height="42" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
<text x="710" y="596" text-anchor="middle" class="node-text">收集工具结果</text>
<text x="710" y="611" text-anchor="middle" class="sub-text">结构化输出</text>
<text x="710" y="600" text-anchor="middle" class="small-text" fill="#6b7280">7</text>
<path d="M 800 591 L 800 405 L 680 405" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5,3"/>
<text x="810" y="498" class="small-text" fill="#dc2626">工具结果回填</text>
<text x="810" y="510" class="small-text" fill="#dc2626">重新调用 LLM</text>
<line x1="480" y1="510" x2="480" y2="560" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)" />
<text x="490" y="540" class="small-text" fill="#2563eb">否</text>
<rect x="380" y="560" width="200" height="50" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
<text x="480" y="590" text-anchor="middle" class="node-text">生成最终回复</text>
<text x="480" y="605" text-anchor="middle" class="sub-text">流式输出到终端</text>
<text x="480" y="595" text-anchor="middle" class="small-text" fill="#6b7280">6</text>
<line x1="480" y1="610" x2="480" y2="650" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)" />
<rect x="380" y="650" width="200" height="42" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
<text x="480" y="676" text-anchor="middle" class="node-text">终端展示回复</text>
<text x="480" y="691" text-anchor="middle" class="sub-text">用户看到结果</text>
<text x="480" y="680" text-anchor="middle" class="small-text" fill="#6b7280">7</text>
<line x1="480" y1="692" x2="480" y2="725" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow-gray)" />
<rect x="380" y="725" width="200" height="42" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
<text x="480" y="751" text-anchor="middle" class="node-text">MemoryStore 归档</text>
<text x="480" y="766" text-anchor="middle" class="sub-text">写入 history.jsonl + Dream</text>
<text x="480" y="755" text-anchor="middle" class="small-text" fill="#6b7280">8</text>
<line x1="480" y1="767" x2="480" y2="795" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow-gray)" />
<rect x="430" y="795" width="100" height="36" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="480" y="818" text-anchor="middle" class="node-text">结束</text>
<g transform="translate(30, 20)">
  <rect x="0" y="0" width="130" height="58" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="65" y="16" text-anchor="middle" class="sub-text" font-weight="600">图例</text>
  <rect x="8" y="24" width="14" height="14" rx="2" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="28" y="36" class="small-text">处理步骤</text>
  <polygon points="65,38 72,46 65,54 58,46" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="78" y="50" class="small-text">判断</text>
</g>
</svg>
