<rect x="390" y="427" width="180" height="36" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" filter="url(#shadow)"/>
<text x="480" y="450" text-anchor="middle" class="node-text">MemoryStore</text>
<line x1="480" y1="410" x2="480" y2="427" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
<line x1="400" y1="390" x2="400" y2="463" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="395,387 400,380 405,387" fill="#dc2626"/>
<polygon points="395,466 400,473 405,466" fill="#dc2626"/>
<text x="345" y="400" class="small-text" fill="#dc2626" text-anchor="end">读/写</text>
