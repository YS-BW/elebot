<text x="480" y="563" text-anchor="middle" class="small-text">LLM API · 64K 上下文 · 模型服务</text>
<line x1="710" y1="337" x2="800" y2="337" stroke="#9ca3af" stroke-width="1.5"/>
<line x1="800" y1="337" x2="800" y2="530" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
