<text x="480" y="208" text-anchor="middle" class="small-text">配置 → Provider → Bus → AgentLoop 统一装配 + 生命周期管理</text>
<line x1="480" y1="125" x2="480" y2="175" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
<rect x="30" y="260" width="900" height="220" rx="6" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="45" y="276" class="layer-label">核心层 / Agent Core</text>
