<line x1="570" y1="315" x2="618" y2="315" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
<rect x="390" y="370" width="180" height="40" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
