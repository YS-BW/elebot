<path d="M 150 590 L 150 650" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
<text x="140" y="602" class="small-text" fill="#ea580c" text-anchor="end">工具调用</text>
<path d="M 605 735 L 850 735 L 850 315 L 798 315" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)" stroke-dasharray="5,3"/>
<text x="860" y="318" class="small-text" fill="#ea580c">工具结果回填</text>
<g transform="translate(35, 757)">
  <line x1="0" y1="6" x2="25" y2="6" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="31" y="10" class="small-text">核心数据流</text>
  <line x1="120" y1="6" x2="145" y2="6" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
