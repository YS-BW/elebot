<line x1="480" y1="530" x2="150" y2="530" stroke="#9ca3af" stroke-width="1.5"/>
<line x1="150" y1="530" x2="150" y2="480" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
