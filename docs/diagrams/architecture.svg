<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780" width="960" height="780">
<style>
  text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  .layer-label { font-size: 12px; fill: #6b7280; font-weight: 600; letter-spacing: 1px; }
  .title { font-size: 16px; fill: #111827; font-weight: 600; }
  .subtitle { font-size: 11px; fill: #6b7280; }
  .node-text { font-size: 13px; fill: #111827; font-weight: 600; }
  .small-text { font-size: 11px; fill: #6b7280; }
</style>
<text x="480" y="25" text-anchor="middle" class="title">EleBot 系统架构图</text>
<defs>
  <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
  </marker>
  <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
  </marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
  </marker>
  <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
  </marker>
  <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
  </filter>
</defs>
<rect x="30" y="45" width="900" height="80" rx="6" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="45" y="61" class="layer-label">入口层 / CLI Entry</text>
<rect x="80" y="70" width="200" height="40" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
<text x="180" y="94" text-anchor="middle" class="node-text">elebot agent</text>
<rect x="320" y="70" width="200" height="40" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
<text x="420" y="94" text-anchor="middle" class="node-text">elebot onboard</text>
<rect x="560" y="70" width="200" height="40" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
<text x="660" y="94" text-anchor="middle" class="node-text">elebot status</text>
<rect x="30" y="150" width="900" height="85" rx="6" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6,4"/>
