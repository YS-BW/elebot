<rect x="360" y="650" width="130" height="35" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" filter="url(#shadow)"/>
<text x="425" y="672" text-anchor="middle" class="node-text">Shell 工具</text>
<rect x="510" y="650" width="130" height="35" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
